{% extends "base.html" %}
{% block content %}

<!-- Interactive AI Search Bar -->
<div class="glass-panel ai-box">
    <div class="ai-header">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"></path></svg>
        Mersin AI Asistanı
    </div>
    <form id="aiForm" onsubmit="askAI(event)" class="ai-form">
        <input type="text" id="aiInput" class="ai-input" placeholder="Bugün nasıl hissediyorsun? Sen söyle, ben etkinlik bulayım..." required>
        <button type="submit" id="aiBtn" class="ai-submit-btn">✨ Bana Ne Var?</button>
    </form>
    
    <!-- AI Response Container -->
    <div id="aiResponseContainer" class="ai-response-container {% if not ai_suggestion %}hidden{% endif %}">
        <div id="aiLoader" class="ai-loader hidden">Asistan düşünüyor... <div class="spinner"></div></div>
        <p id="aiResponseText" class="ai-text">{{ ai_suggestion|safe if ai_suggestion else '' }}</p>
    </div>
</div>

<!-- Category Filters -->
<div class="filters">
    <button class="filter-btn active" onclick="filterEvents('Tümü')">Tümü</button>
    <button class="filter-btn" onclick="filterEvents('Müzik')">Müzik</button>
    <button class="filter-btn" onclick="filterEvents('Tiyatro')">Tiyatro</button>
    <button class="filter-btn" onclick="filterEvents('Gezi')">Gezi</button>
    <button class="filter-btn" onclick="filterEvents('Gastronomi')">Gastronomi</button>
    <button class="filter-btn" onclick="filterEvents('Sinema')">Sinema</button>
</div>

<!-- Event List -->
<div class="cards-grid">
    {% for event in events %}
    <div class="card" data-category="{{ event.category }}">
        <div class="badge">{{ event.category }}</div>
        <h3 class="card-title">{{ event.name }}</h3>
        <p class="venue">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            {{ event.venue }}
        </p>
        <div class="card-footer">
            <span class="date">{{ event.date }}</span>
            <button onclick="openBiletModal('{{ event.name|escape }}')" class="btn">
                Bilet Al 
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"></path></svg>
            </button>
        </div>
    </div>
    {% endfor %}
</div>

<!-- Bilet Modal -->
<div id="biletModal" class="modal-overlay">
    <div class="modal">
        <h2 id="modalEventName" class="modal-title"></h2>
        
        <!-- Step 1: Ticket Details -->
        <div id="step1">
            <div class="form-group">
                <label class="form-label">Ad Soyad</label>
                <input type="text" id="owner_name" required class="form-input" placeholder="Örn: Jane Doe" value="{{ session.username if session.username else '' }}">
            </div>
            <div class="form-group">
                <label class="form-label">Bilet Adedi</label>
                <input type="number" id="ticket_count" min="1" value="1" required class="form-input">
            </div>
            <div class="modal-actions">
                <button type="button" onclick="closeBiletModal()" class="btn btn-secondary">İptal</button>
                <button type="button" onclick="goToPayment()" class="btn btn-primary">Ödeme Ekranına Geç</button>
            </div>
        </div>

        <!-- Step 2: Payment Details -->
        <div id="step2" class="hidden">
            <div class="payment-summary">
                <p><strong>Etkinlik:</strong> <span id="summaryEvent"></span></p>
                <p><strong>Adet:</strong> <span id="summaryCount"></span></p>
                <p><strong>Toplam:</strong> <span id="summaryTotal"></span> ₺</p>
            </div>
            
            <div class="form-group">
                <label class="form-label">Kart Numarası</label>
                <input type="text" id="card_number" class="form-input" placeholder="0000 0000 0000 0000" maxlength="19">
            </div>
            <div style="display: flex; gap: 1rem;">
                <div class="form-group" style="flex: 2;">
                    <label class="form-label">Son Kullanma</label>
                    <input type="text" id="expiry" class="form-input" placeholder="AA/YY" maxlength="5">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label class="form-label">CVV</label>
                    <input type="text" id="cvv" class="form-input" placeholder="123" maxlength="3">
                </div>
            </div>

            <div class="modal-actions">
                <button type="button" onclick="backToDetails()" class="btn btn-secondary">Geri</button>
                <button type="button" onclick="processPayment(event)" id="payBtn" class="btn btn-success">Ödemeyi Yap</button>
            </div>
        </div>

        <input type="hidden" id="hiddenEventName">
    </div>
</div>

<script>
async function askAI(e) {
    e.preventDefault();
    const btn = document.getElementById('aiBtn');
    const input = document.getElementById('aiInput');
    const container = document.getElementById('aiResponseContainer');
    const loader = document.getElementById('aiLoader');
    const responseText = document.getElementById('aiResponseText');
    
    // UI Loading state
    container.classList.remove('hidden');
    loader.classList.remove('hidden');
    responseText.innerHTML = '';
    btn.disabled = true;
    
    try {
        const res = await fetch('/ask_ai', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ user_input: input.value })
        });
        const data = await res.json();
        
        loader.classList.add('hidden');
        responseText.innerHTML = data.suggestion;
    } catch (err) {
        loader.classList.add('hidden');
        responseText.innerHTML = "Sunucu ile bağlantı sağlanamadı. Lütfen daha sonra tekrar deneyin.";
    } finally {
        btn.disabled = false;
    }
}

function filterEvents(category) {
    const cards = document.querySelectorAll('.card');
    const buttons = document.querySelectorAll('.filter-btn');
    
    buttons.forEach(btn => {
        if(btn.innerText.trim() === category) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    });

    cards.forEach(card => {
        if(category === 'Tümü' || card.getAttribute('data-category') === category) {
            card.style.display = 'flex';
        } else {
            card.style.display = 'none';
        }
    });
}
</script>

{% endblock %}
