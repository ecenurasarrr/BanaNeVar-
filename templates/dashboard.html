{% extends "base.html" %}
{% block content %}
<div class="bg-gradient-to-r from-amber-50 to-orange-50 border-l-8 border-orange-400 p-8 rounded-2xl shadow-sm mb-12">
    <h2 class="text-orange-800 font-bold text-xl mb-2 flex items-center gap-2">✨ Mersin AI Asistanın:</h2>
    <p class="text-orange-900 text-lg italic leading-relaxed">"{{ ai_suggestion }}"</p>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    {% for event in events %}
    <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-100 hover:shadow-lg transition-all group">
        <span class="bg-indigo-100 text-indigo-700 text-xs font-black px-3 py-1 rounded-full uppercase">{{ event.category }}</span>
        <h3 class="text-2xl font-bold mt-4 group-hover:text-indigo-600 transition">{{ event.name }}</h3>
        <p class="text-slate-500 mt-3 flex items-center gap-2">📍 {{ event.venue }}</p>
        <div class="mt-6 pt-4 border-t border-slate-50 flex justify-between items-center">
            <span class="text-slate-400 font-medium">{{ event.date }}</span>
            <button onclick="openBiletModal('{{ event.name }}')" class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-indigo-700 transition">
                Bilet Al →
            </button>
        </div>
    </div>
    {% endfor %}
</div>

<div id="biletModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl max-w-md w-full p-8 shadow-2xl animate-fade-in-up">
        <h2 id="modalEventName" class="text-2xl font-bold text-indigo-700 mb-4"></h2>
        <form id="biletForm" onsubmit="buyTicket(event)">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Ad Soyad</label>
                    <input type="text" required class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Bilet Adedi</label>
                    <input type="number" min="1" value="1" required class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div class="bg-gray-50 p-4 rounded-lg">
                    <p class="text-sm text-gray-600 italic">Ödeme simülasyonu: "Kapıda Ödeme" veya "Kampüs Kart" seçeneği aktiftir.</p>
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeBiletModal()" class="flex-1 py-2 border rounded-lg font-bold text-gray-500 hover:bg-gray-50">İptal</button>
                    <button type="submit" class="flex-1 py-2 bg-green-600 text-white rounded-lg font-bold hover:bg-green-700">İşlemi Tamamla</button>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
function openBiletModal(eventName) {
    document.getElementById('modalEventName').innerText = eventName + " Bileti";
    document.getElementById('biletModal').classList.remove('hidden');
}

function closeBiletModal() {
    document.getElementById('biletModal').classList.add('hidden');
}

function buyTicket(e) {
    e.preventDefault();
    alert("Tebrikler! Biletiniz başarıyla oluşturuldu. QR kodunuz kayıtlı e-posta adresinize (veya öğrenci numaranıza) gönderilmiştir.");
    closeBiletModal();
}
</script>
{% endblock %}
