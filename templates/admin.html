{% extends "base.html" %}
{% block content %}
<div class="glass-panel" style="max-width: 600px; margin: 0 auto;">
    <h2 class="title" style="font-size: 2rem; margin-bottom: 1.5rem; text-align: center;">⚙️ Etkinlik Ekle</h2>
    <form action="/add_event" method="POST">
        <div class="form-group">
            <label class="form-label">Etkinlik Adı</label>
            <input type="text" name="name" class="form-input" required placeholder="Örn: Açık Hava Konseri">
        </div>
        <div class="form-group">
            <label class="form-label">Kategori</label>
            <select name="category" class="form-input" required>
                <option value="Müzik">Müzik</option>
                <option value="Tiyatro">Tiyatro</option>
                <option value="Gezi">Gezi</option>
                <option value="Gastronomi">Gastronomi</option>
                <option value="Sinema">Sinema</option>
                <option value="Spor">Spor</option>
                <option value="Diğer">Diğer</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Mekan</label>
            <input type="text" name="venue" class="form-input" required placeholder="Örn: Yenişehir Sahne">
        </div>
        <div class="form-group">
            <label class="form-label">Tarih</label>
            <input type="text" name="date" class="form-input" required placeholder="Örn: 20.03.2026">
        </div>
        <div class="modal-actions" style="margin-top: 2rem;">
            <a href="/" class="btn btn-secondary">İptal</a>
            <button type="submit" class="btn btn-success">Kaydet</button>
        </div>
    </form>
</div>
{% endblock %}
